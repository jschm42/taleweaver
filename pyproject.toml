[tool.ruff]
# Target Python version
target-version = "py310"
line-length = 100
exclude = [
    ".git",
    ".mypy_cache",
    ".pytest_cache",
    ".ruff_cache",
    ".venv",
    "venv",
    "alembic",
    "backend/brain/*/scratch",
    "D:/_pyrefly_virtual_",
]

[tool.ruff.lint]
# Enable various linting rules
# E: pycodestyle errors
# F: Pyflakes
# B: flake8-bugbear
# I: isort
# N: pep8-naming
# UP: pyupgrade
# PL: Pylint
# C90: mccabe (complexity)
select = ["E", "F", "B", "I", "N", "UP", "PL", "C90"]
ignore = []

# Allow fixable violations to be fixed automatically
fixable = ["ALL"]
unfixable = []

[tool.ruff.lint.mccabe]
max-complexity = 10

[tool.ruff.lint.pylint]
max-args = 8

[tool.mypy]
python_version = "3.10"
exclude = [
    "venv",
    "alembic",
    "backend/brain/.*/scratch",
    "D:/_pyrefly_virtual_",
]
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = false
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = true
strict_optional = true

[[tool.mypy.overrides]]
module = [
    "sqlalchemy.*",
    "aiosqlite.*",
    "litellm.*",
    "alembic.*",
    "passlib.*",
    "jose.*"
]
ignore_missing_imports = true
