version: '3.8'

services:
  taleweaver:
    build: .
    container_name: taleweaver
    image: taleweaver:latest
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    restart: unless-stopped
    # Enable communication with Ollama running on the host
    extra_hosts:
      - "host.docker.internal:host-gateway"
