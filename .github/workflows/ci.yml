name: TaleWeaver CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-lint-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        # Install dev dependencies directly for CI
        pip install pytest pytest-asyncio httpx flake8 black mypy

    - name: Check Formatting with Black
      run: |
        black backend --check --line-length 120

    - name: Lint with Flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 backend --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 backend --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

    - name: Type checking with mypy
      run: |
        mypy backend --ignore-missing-imports || true # Optional: remove || true once fully typed

    - name: Run Tests with pytest
      run: |
        # Ensure a tests directory exists or this step will fail natively.
        # We handle it gracefully in case it doesn't exist yet.
        if [ -d "backend/tests" ]; then
          PYTHONPATH=. pytest backend/tests/ -v
        else
          echo "No tests directory found. Skipping tests."
        fi
